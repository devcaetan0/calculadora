<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Correção da Calculadora</title>
</head>

<body>

    <main class="container">
        <div class="calculadora">
            <div>
                <div class="form-group">
                    <label for="numero1">Primeiro Número</label>
                    <input type="text" id="numero1" placeholder="Digite um número" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="numero2">Segundo Número</label>
                    <input type="text" id="numero2" placeholder="Digite um número" autocomplete="off">
                </div>
            </div>
            <div class="botoes">
                <button class="btn btn-soma" onclick="somar()">Soma (+)</button>
                <button class="btn btn-subtracao" onclick="subtrair()">Subtração (-)</button>
                <button class="btn btn-multiplicacao" onclick="multiplicar()">Multiplicação (*)</button>
                <button class="btn btn-divisao" onclick="dividir()">Divisão (/)</button>
            </div>
            <div class="resultado">
                <p>Resultado: <span id="resultado">0</span></p>
            </div>

            <div>
                <button class="btn btn-limpar" onclick="limpar()">Limpar</button>
            </div>

        </div>

    </main>

    <script src="correcao.js"></script>
    
</body>

</html>
