<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Calculadora</title>
</head>

<body>
    <header id="titulo">
        <h1>CALCULADORA SIMPLES</h1>
    </header>

    <main>
        <div id="calculadora">
            <input class="display" />

            <button onclick="limpa_tela()" class="botao-roxo">AC</button>

            <button onclick="inverte_sinal()" class="botao-roxo">+/-</button>

            <button onclick="add_char('/')" class="botao-roxo">/</button>
            <button onclick="add_char('*')" class="botao-roxo">*</button>

            <button onclick="add_char('7')" class="botao-rosa">7</button>
            <button onclick="add_char('8')" class="botao-rosa">8</button>
            <button onclick="add_char('9')" class="botao-rosa">9</button>

            <button onclick="add_char('-')" class="botao-roxo">-</button>

            <button onclick="add_char('4')" class="botao-rosa">4</button>
            <button onclick="add_char('5')" class="botao-rosa">5</button>
            <button onclick="add_char('6')" class="botao-rosa">6</button>

            <button onclick="add_char('+')" class="botao-roxo">+</button>

            <button onclick="add_char('1')" class="botao-rosa">1</button>
            <button onclick="add_char('2')" class="botao-rosa">2</button>
            <button onclick="add_char('3')" class="botao-rosa">3</button>

            <button onclick="calcula()" class="ingual">=</button>

            <button onclick="add_char('0')" class="zero">0</button>

            <button onclick="add_char('.')" class="botao-rosa">.</button>
        </div>
    </main>
</body>

<script src="script.js"></script>

</html>
