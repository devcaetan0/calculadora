<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Calculadora</title>
</head>

<body>
    <header id="titulo">
        <h1>CALCULADORA SIMPLES</h1>
    </header>

    <main>
        <div id="calculadora">
            <input class="display" />

            <button class="botao-roxo">AC</button>
            <button class="botao-roxo">+/-</button>

            <button class="botao-roxo">/</button>
            <button class="botao-roxo">*</button>

            <button class="botao-rosa">7</button>
            <button class="botao-rosa">8</button>
            <button class="botao-rosa">9</button>

            <button class="botao-roxo">-</button>
            <button class="botao-rosa">4</button>
            <button class="botao-rosa">5</button>
            <button class="botao-rosa">6</button>

            <button class="botao-roxo">+</button>

            <button class="botao-rosa">1</button>
            <button class="botao-rosa">2</button>
            <button class="botao-rosa">3</button>

            <button class="ingual">=</button>

            <button class="zero">0</button>
            <button class="botao-rosa">.</button>
        </div>
    </main>
</body>

<script src="script.js"></script>

</html>
